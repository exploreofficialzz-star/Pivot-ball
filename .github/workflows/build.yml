name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  FLUTTER_VERSION: '3.41.9'

jobs:
  build-android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Create asset directories
        run: mkdir -p assets/images assets/audio

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-warnings

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=ADMOB_BANNER_ANDROID=${{ secrets.ADMOB_BANNER_ANDROID || 'ca-app-pub-3940256099942544/6300978111' }} \
            --dart-define=ADMOB_BANNER_IOS=${{ secrets.ADMOB_BANNER_IOS || 'ca-app-pub-3940256099942544/2934735716' }} \
            --dart-define=ADMOB_INTERSTITIAL_ANDROID=${{ secrets.ADMOB_INTERSTITIAL_ANDROID || 'ca-app-pub-3940256099942544/1033173712' }} \
            --dart-define=ADMOB_INTERSTITIAL_IOS=${{ secrets.ADMOB_INTERSTITIAL_IOS || 'ca-app-pub-3940256099942544/4411468910' }} \
            --dart-define=ADMOB_REWARDED_ANDROID=${{ secrets.ADMOB_REWARDED_ANDROID || 'ca-app-pub-3940256099942544/5224354917' }} \
            --dart-define=ADMOB_REWARDED_IOS=${{ secrets.ADMOB_REWARDED_IOS || 'ca-app-pub-3940256099942544/1712485313' }}
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEYSTORE_PATH: keystore.jks

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --dart-define=ADMOB_BANNER_ANDROID=${{ secrets.ADMOB_BANNER_ANDROID || 'ca-app-pub-3940256099942544/6300978111' }} \
            --dart-define=ADMOB_BANNER_IOS=${{ secrets.ADMOB_BANNER_IOS || 'ca-app-pub-3940256099942544/2934735716' }} \
            --dart-define=ADMOB_INTERSTITIAL_ANDROID=${{ secrets.ADMOB_INTERSTITIAL_ANDROID || 'ca-app-pub-3940256099942544/1033173712' }} \
            --dart-define=ADMOB_INTERSTITIAL_IOS=${{ secrets.ADMOB_INTERSTITIAL_IOS || 'ca-app-pub-3940256099942544/4411468910' }} \
            --dart-define=ADMOB_REWARDED_ANDROID=${{ secrets.ADMOB_REWARDED_ANDROID || 'ca-app-pub-3940256099942544/5224354917' }} \
            --dart-define=ADMOB_REWARDED_IOS=${{ secrets.ADMOB_REWARDED_IOS || 'ca-app-pub-3940256099942544/1712485313' }}
        env:
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEYSTORE_PATH: keystore.jks

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Create asset directories
        run: mkdir -p assets/images assets/audio

      - name: Get dependencies
        run: flutter pub get

      - name: Inject AdMob App ID into Info.plist
        run: |
          /usr/libexec/PlistBuddy -c \
            "Add :GADApplicationIdentifier string ${{ secrets.ADMOB_APP_ID_IOS }}" \
            ios/Runner/Info.plist

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=ADMOB_BANNER_ANDROID=${{ secrets.ADMOB_BANNER_ANDROID || 'ca-app-pub-3940256099942544/6300978111' }} \
            --dart-define=ADMOB_BANNER_IOS=${{ secrets.ADMOB_BANNER_IOS || 'ca-app-pub-3940256099942544/2934735716' }} \
            --dart-define=ADMOB_INTERSTITIAL_ANDROID=${{ secrets.ADMOB_INTERSTITIAL_ANDROID || 'ca-app-pub-3940256099942544/1033173712' }} \
            --dart-define=ADMOB_INTERSTITIAL_IOS=${{ secrets.ADMOB_INTERSTITIAL_IOS || 'ca-app-pub-3940256099942544/4411468910' }} \
            --dart-define=ADMOB_REWARDED_ANDROID=${{ secrets.ADMOB_REWARDED_ANDROID || 'ca-app-pub-3940256099942544/5224354917' }} \
            --dart-define=ADMOB_REWARDED_IOS=${{ secrets.ADMOB_REWARDED_IOS || 'ca-app-pub-3940256099942544/1712485313' }}

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r PivotBall.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/iphoneos/PivotBall.ipa
          retention-days: 30

      - name: Add IPA to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/ios/iphoneos/PivotBall.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
